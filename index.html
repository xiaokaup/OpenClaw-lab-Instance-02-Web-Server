<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Lab — Instance 02</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 48px;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 2rem;
      color: #58a6ff;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      background: #1f6feb22;
      color: #58a6ff;
      border: 1px solid #1f6feb44;
      border-radius: 20px;
      padding: 4px 16px;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    p {
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .links a {
      display: inline-block;
      color: #58a6ff;
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin: 4px;
      transition: all 0.2s;
    }
    .links a:hover {
      background: #1f6feb22;
      border-color: #58a6ff;
    }
    footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🦞 OpenClaw Lab</h1>
    <div class="badge">Instance 02 — Web Server</div>
    <p>
      一个由 OpenClaw 驱动的自动化 Web 服务实例。<br>
      通过 GitHub Pages 部署，由 AI Agent 维护更新。
    </p>
    <div class="links">
      <a href="https://github.com/xiaokaup/OpenClaw-lab-Instance-02-Web-Server">📦 Repository</a>
    </div>
    <footer>
      Deployed via GitHub Pages · Powered by OpenClaw
    </footer>
  </div>
</body>
</html>
