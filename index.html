<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a73e8">
<title>知田心安 · 农安险 AI 管理平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --primary:#1a73e8;
  --primary-dark:#0d47a1;
  --danger:#d93025;
  --danger-bg:#fce8e6;
  --warning:#e37400;
  --warning-bg:#fef7e0;
  --caution:#ea8600;
  --caution-bg:#feefe0;
  --success:#188038;
  --success-bg:#e6f4ea;
  --bg:#f5f6f8;
  --card:#fff;
  --text:#202124;
  --muted:#5f6368;
  --border:#e0e0e0;
  --radius:12px;
  --shadow:0 1px 4px rgba(0,0,0,.06);
  --header-h:52px;
  --nav-h:46px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:calc(20px + var(--safe-bottom));}

/* ─── Header ─── */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:0 16px;height:var(--header-h);display:flex;align-items:center;gap:10px;}
.header h1{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header .badge{background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.header .subtitle{font-size:11px;opacity:.7;margin-left:auto;white-space:nowrap;}

/* ─── Tab Nav ─── */
.tab-nav{position:sticky;top:var(--header-h);z-index:99;background:#fff;display:flex;overflow-x:auto;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.tab-nav button{flex-shrink:0;padding:12px 14px;border:none;background:none;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;}
.tab-nav button:active{background:var(--bg);}
.tab-nav button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}

.tab-content{display:none;padding:12px;max-width:800px;margin:0 auto;}
.tab-content.active{display:block;}

/* ─── Stats ─── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);}
.stat-card .stat-label{font-size:11px;color:var(--muted);}
.stat-card .stat-value{font-size:24px;font-weight:700;margin-top:2px;}
.stat-card.blue .stat-value{color:var(--primary);}
.stat-card.green .stat-value{color:var(--success);}
.stat-card.orange .stat-value{color:var(--warning);}
.stat-card.red .stat-value{color:var(--danger);}

/* ─── Cards ─── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;}
.card-title{padding:14px 16px 0;font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.card-actions{padding:12px 16px;display:flex;gap:6px;flex-wrap:wrap;}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.card-body{padding:12px 16px;}

/* ─── Tags ─── */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;line-height:1.4;}
.tag-red{background:var(--danger-bg);color:var(--danger);}
.tag-orange{background:var(--warning-bg);color:var(--warning);}
.tag-green{background:var(--success-bg);color:var(--success);}
.tag-blue{background:#e8f0fe;color:var(--primary);}
.tag-gray{background:#f1f3f4;color:var(--muted);}

/* ─── Subject Cards (mobile-friendly table alternative) ─── */
.subj-card{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;min-height:56px;}
.subj-card:last-child{border-bottom:none;}
.subj-card:active{background:var(--bg);margin:0 -16px;padding:12px 16px;}
.subj-info{flex:1;min-width:0;}
.subj-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.subj-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px;}
.subj-right{text-align:right;flex-shrink:0;}

/* ─── Alerts ─── */
.alert-item{padding:12px 14px;border-radius:10px;margin-bottom:8px;border-left:4px solid;font-size:13px;}
.alert-red{background:var(--danger-bg);border-color:var(--danger);}
.alert-orange{background:var(--warning-bg);border-color:var(--warning);}
.alert-yellow{background:#feefe0;border-color:#ea8600;}
.alert-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.alert-level{font-weight:600;font-size:14px;}
.alert-time{font-size:11px;color:var(--muted);white-space:nowrap;}
.alert-detail{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;}
.alert-actions{margin-top:8px;display:flex;gap:6px;}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .12s;gap:4px;min-height:40px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:active{background:#1557b0;}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:7px 14px;font-size:13px;min-height:32px;}
.btn-xs{padding:4px 10px;font-size:11px;min-height:26px;border-radius:6px;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}

/* ─── Sim button ─── */
.sim-btn{background:var(--warning-bg);color:var(--warning);border:1px dashed var(--warning);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;}

/* ─── Modal ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{position:sticky;top:0;background:#fff;padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:16px;z-index:1;}
.modal-head .close{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.modal-body{padding:16px 18px;}
.modal-foot{padding:12px 18px calc(12px + var(--safe-bottom));border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* ─── Detail Grid ─── */
.dl{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dl-item{padding:10px;background:var(--bg);border-radius:8px;}
.dl-item.full{grid-column:1/-1;}
.dl-item .dk{font-size:11px;color:var(--muted);}
.dl-item .dv{font-size:14px;font-weight:500;margin-top:2px;word-break:break-all;}

/* ─── Chart ─── */
.chart-box{position:relative;height:200px;}

/* ─── Bars ─── */
.bar{margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;}
.bar-track{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease;}

/* ─── Score ring ─── */
.score-ring{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 10px;}
.score-ring .num{font-size:30px;font-weight:700;}
.score-ring .lbl{font-size:11px;opacity:.8;}
.score-ring.green{background:var(--success-bg);color:var(--success);}
.score-ring.orange{background:var(--warning-bg);color:var(--warning);}
.score-ring.red{background:var(--danger-bg);color:var(--danger);}

/* ─── Search bar ─── */
.search-bar{display:flex;gap:8px;margin-bottom:4px;}
.search-bar input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);outline:none;}
.search-bar input:focus{border-color:var(--primary);background:#fff;}

/* ─── Filter tabs ─── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.filter-row .flt-btn{padding:6px 14px;border-radius:16px;border:1.5px solid var(--border);background:transparent;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.filter-row .flt-btn:active{background:var(--bg);}
.filter-row .flt-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ─── Form ─── */
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:#fff;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);}

/* ─── Test data list (mobile) ─── */
.test-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;}
.test-item:last-child{border-bottom:none;}
.test-item .test-main{flex:1;min-width:0;}
.test-item .test-main .test-subj{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.test-item .test-main .test-detail{font-size:11px;color:var(--muted);margin-top:2px;}

/* ─── Empty state ─── */
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);}
.empty-state .icon{font-size:40px;opacity:.3;}
.empty-state p{font-size:14px;margin-top:8px;}

/* ─── Chart grid ─── */
.chart-grid{display:grid;grid-template-columns:1fr;gap:12px;}
@media(min-width:480px){.chart-grid{grid-template-columns:1fr 1fr;}}

/* ─── Advice box ─── */
.advice-box{background:var(--bg);padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.6;}

/* ─── Desktop tweaks ─── */
@media(min-width:768px){
  .tab-content{padding:20px;}
  .stats-grid{grid-template-columns:repeat(4,1fr);}
  .subj-card{padding:14px 0;}
  .dl{grid-template-columns:1fr 1fr;}
  .modal{width:90%;border-radius:16px;}
  .modal-overlay{align-items:center;}
}

/* ─── Toast ─── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.25);animation:toastIn .3s ease;max-width:90%;text-align:center;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <h1>🌾 知田心安</h1>
  <span class="badge">v0.0.2</span>
  <span class="subtitle">农安险 AI 管理</span>
</div>

<div class="tab-nav">
  <button class="active" onclick="switchTab('tab1',this)">📋 主体库</button>
  <button onclick="switchTab('tab2',this)">📊 风险评估</button>
  <button onclick="switchTab('tab3',this)">🚨 监测预警</button>
</div>

<!-- ════════════════ TAB 1: 主体库 ════════════════ -->
<div id="tab1" class="tab-content active">
  <div class="stats-grid" id="m1-stats"></div>

  <div class="card">
    <div class="card-header">
      <span>投保主体列表</span>
      <button class="btn btn-primary btn-sm" onclick="showAddSubject()">+ 新增</button>
    </div>
    <div class="card-body" style="padding-bottom:4px;">
      <div class="search-bar">
        <input type="text" id="s1-search" placeholder="🔍 搜索主体名称…" oninput="renderSubjects()">
      </div>
    </div>
    <div class="card-body" style="padding-top:0;" id="subject-list"></div>
  </div>
</div>

<!-- ════════════════ TAB 2: 风险评估 ════════════════ -->
<div id="tab2" class="tab-content">
  <div class="stats-grid" id="m2-stats"></div>

  <div class="card">
    <div class="card-title">
      <span>风险评级一览</span>
      <span style="font-size:12px;color:var(--muted);font-weight:400;" id="m2-filter-label">全部</span>
    </div>
    <div class="card-body">
      <div class="filter-row" id="risk-filters">
        <button class="flt-btn active" onclick="filterRisk('all',this)">全部</button>
        <button class="flt-btn" onclick="filterRisk('low',this)">🟢 低风险</button>
        <button class="flt-btn" onclick="filterRisk('mid',this)">🟡 中风险</button>
        <button class="flt-btn" onclick="filterRisk('high',this)">🔴 高风险</button>
      </div>
    </div>
  </div>

  <div class="card" id="risk-subject-list">
    <div class="card-header">主体风险详情</div>
    <div class="card-body" style="padding-top:0;" id="risk-list"></div>
  </div>

  <div class="chart-grid">
    <div class="card">
      <div class="card-header">📈 等级分布</div>
      <div class="card-body"><div class="chart-box"><canvas id="chartDist"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-header">📊 分品种风险</div>
      <div class="card-body"><div class="chart-box"><canvas id="chartProd"></canvas></div></div>
    </div>
  </div>
</div>

<!-- ════════════════ TAB 3: 监测预警 ════════════════ -->
<div id="tab3" class="tab-content">
  <div class="stats-grid" id="m3-stats"></div>

  <div class="card">
    <div class="card-header">
      <span>🚨 实时预警</span>
      <button class="sim-btn btn-sm" onclick="simAlert()">⚡ 模拟预警</button>
    </div>
    <div class="card-body" id="alert-list"></div>
  </div>

  <div class="chart-grid">
    <div class="card">
      <div class="card-header">📉 预警趋势</div>
      <div class="card-body"><div class="chart-box"><canvas id="chartTrend"></canvas></div></div>
    </div>
    <div class="card">
      <div class="card-header">⚡ 最新检测</div>
      <div class="card-body" style="padding:0;" id="test-feed"></div>
    </div>
  </div>
</div>

<!-- ════════════════ MODAL ════════════════ -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <span id="modal-title">详情</span>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════
const SUBJECTS = [
  { id:'S001', name:'从化绿源蔬菜专业合作社', type:'合作社', product:'蔬菜', region:'广州从化', riskScore:85, riskLevel:'low', status:'active',

const DIM_KEYS = ['inputs','passRate','env','mgmt','scale'];
const DIM_LABELS = { inputs:'投入品使用', passRate:'检测合格率', env:'生产环境', mgmt:'管理制度', scale:'规模经验' };
const STATUS_MAP = { active:{label:'已入库',cls:'tag-green'}, pending:{label:'待审核',cls:'tag-orange'}, rejected:{label:'已驳回',cls:'tag-red'} };

let testLogs = [
  { time:'今天 15:30', subj:'三水刘氏生猪养殖场', prod:'生猪', item:'磺胺类', val:'85 μg/kg', lim:'100 μg/kg', pass:true },

  { time:'昨天 16:30', subj:'博罗县丰产水产合作社', prod:'草鱼', item:'孔雀石绿', val:'0.3 μg/kg', lim:'1 μg/kg', pass:true },

let alerts = [
  { level:2, subj:'三水绿丰蔬菜基地', prod:'白菜', item:'毒死蜱', val:'0.08 mg/kg', lim:'0.1 mg/kg', note:'连续2次趋势上升，接近限值80%', time:'今天 11:20' },

];

// Charts
let chDist, chProd, chTrend;

// Risk filter state
let riskFilter = 'all';

// ════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}

function toast(msg){
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

// ════════════════════════════════════════════
// TAB 1: 主体库
// ════════════════════════════════════════════
function renderSubjects(){
  const q = document.getElementById('s1-search').value.trim().toLowerCase();
  const list = q ? SUBJECTS.filter(s=>s.name.toLowerCase().includes(q)) : SUBJECTS;

  // Stats
  document.getElementById('m1-stats').innerHTML = `
    <div class="stat-card blue"><div class="stat-label">总主体</div><div class="stat-value">${SUBJECTS.length}</div></div>
    <div class="stat-card green"><div class="stat-label">已入库</div><div class="stat-value">${SUBJECTS.filter(s=>s.status==='active').length}</div></div>
    <div class="stat-card orange"><div class="stat-label">待审核</div><div class="stat-value">${SUBJECTS.filter(s=>s.status==='pending').length}</div></div>
    <div class="stat-card red"><div class="stat-label">已驳回</div><div class="stat-value">${SUBJECTS.filter(s=>s.status==='rejected').length}</div></div>
  `;

  // List
  const el = document.getElementById('subject-list');
  el.innerHTML = list.map(s=>{
    const st = STATUS_MAP[s.status];
    const rl = RISK_MAP[s.riskLevel];
    return `<div class="subj-card" onclick="showSubject('${s.id}')">
      <div class="subj-info">
        <div class="subj-name">${s.region} · ${s.name}</div>
        <div class="subj-meta">
          <span>${s.type}</span><span>·</span><span>${s.product}</span><span>·</span><span class="tag ${st.cls}" style="font-size:11px;">${st.label}</span>
        </div>
      </div>
      <div class="subj-right">
        <div class="tag ${rl.cls}" style="font-size:11px;">${rl.label}</div>
      </div>
    </div>`;
  }).join('');
  if(!list.length) el.innerHTML='<div class="empty-state"><p>没有匹配的主体</p></div>';
}

function showSubject(id){
  const s = SUBJECTS.find(x=>x.id===id);
  if(!s) return;
  const st = STATUS_MAP[s.status];
  const rl = RISK_MAP[s.riskLevel];
  const srCls = s.riskLevel==='low'?'green':s.riskLevel==='mid'?'orange':'red';

  const bars = DIM_KEYS.map(k=>{
    const v=s.dims[k]; const c=v>=80?'var(--success)':v>=60?'var(--warning)':'var(--danger)';
    return `<div class="bar"><div class="bar-label"><span>${DIM_LABELS[k]}</span><span>${v}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${c};"></div></div></div>`;
  }).join('');

  const mFoot = s.status==='pending'
    ? `<button class="btn btn-success btn-sm" onclick="approveSubj('${s.id}')">✅ 通过入库</button>
       <button class="btn btn-danger btn-sm" onclick="rejectSubj('${s.id}')">❌ 驳回</button>`
    : '';

  setModal('📋 ' + s.name, `
    <div class="dl">
      <div class="dl-item"><div class="dk">编号</div><div class="dv">${s.id}</div></div>
      <div class="dl-item"><div class="dk">类型</div><div class="dv">${s.type}</div></div>
      <div class="dl-item"><div class="dk">品种</div><div class="dv">${s.product}</div></div>
      <div class="dl-item"><div class="dk">所在地</div><div class="dv">${s.region}</div></div>
      <div class="dl-item"><div class="dk">风险等级</div><div class="dv"><span class="tag ${rl.cls}">${rl.label}</span></div></div>
      <div class="dl-item"><div class="dk">入库状态</div><div class="dv"><span class="tag ${st.cls}">${st.label}</span></div></div>
      <div class="dl-item full"><div class="dk">简介</div><div class="dv">${s.desc}</div></div>
    </div>
    <div style="margin-top:14px;font-size:14px;font-weight:500;">📊 风险评估</div>
    <div style="text-align:center;margin:8px 0;">
      <div class="score-ring ${srCls}"><div class="num">${s.riskScore}</div><div class="lbl">${s.riskLevel==='low'?'良好':s.riskLevel==='mid'?'关注':'高危'}</div></div>
    </div>
    ${bars}
  `, mFoot);

  if(s.status!=='pending') showModal();
}

function approveSubj(id){
  const s = SUBJECTS.find(x=>x.id===id);
  if(s) s.status='active';
  closeModal(); renderSubjects(); toast('✅ ' + s.name + ' 已通过入库');
}

function rejectSubj(id){
  const s = SUBJECTS.find(x=>x.id===id);
  if(s) s.status='rejected';
  closeModal(); renderSubjects(); toast('❌ ' + s.name + ' 已驳回');
}

function showAddSubject(){
  setModal('📝 新增投保主体', `
    <div class="form-group"><label>主体名称</label><input id="f-name" placeholder="例如：从化XX蔬菜合作社"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group"><label>类型</label><select id="f-type"><option>合作社</option><option>企业</option><option>家庭农场</option><option>农户</option><option>集体经济组织</option></select></div>
      <div class="form-group"><label>品种</label><select id="f-product"><option>蔬菜</option><option>荔枝</option><option>生猪</option><option>水产</option></select></div>
    </div>
    <div class="form-group"><label>所在地</label><select id="f-region"><option>广州从化</option><option>佛山三水</option><option>江门新会</option><option>惠州博罗</option><option>肇庆高要</option></select></div>
    <div class="form-group"><label>简介</label><textarea id="f-desc" rows="2" placeholder="主体基本情况…"></textarea></div>
  `, `<button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
       <button class="btn btn-primary btn-sm" onclick="submitNewSubj()">提交申请</button>`);
}

function submitNewSubj(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ toast('请填写主体名称'); return; }
  const id = 'S' + String(SUBJECTS.length+1).padStart(3,'0');
  SUBJECTS.push({ id, name, type:document.getElementById('f-type').value, product:document.getElementById('f-product').value,
    region:document.getElementById('f-region').value, riskScore:70, riskLevel:'mid', status:'pending',
    dims:{ inputs:70, passRate:70, env:70, mgmt:60, scale:70 },
    desc:document.getElementById('f-desc').value || '新增主体，待完善资料。' });
  closeModal(); renderSubjects(); toast('✅ ' + name + ' 已提交入库申请');
}

// ════════════════════════════════════════════
// TAB 2: 风险评估
// ════════════════════════════════════════════
function filterRisk(lv,btn){
  riskFilter=lv;
  document.querySelectorAll('#risk-filters .flt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('m2-filter-label').textContent = lv==='all'?'全部':lv==='high'?'高风险':lv==='mid'?'中风险':'低风险';
  renderRiskList();
}

function renderRiskList(){
  const actives = SUBJECTS.filter(s=>s.status==='active');
  const list = riskFilter==='all' ? actives : actives.filter(s=>s.riskLevel===riskFilter);

  // Stats
  document.getElementById('m2-stats').innerHTML = `
    <div class="stat-card green"><div class="stat-label">低风险 🟢</div><div class="stat-value">${actives.filter(s=>s.riskLevel==='low').length}</div></div>
    <div class="stat-card orange"><div class="stat-label">中风险 🟡</div><div class="stat-value">${actives.filter(s=>s.riskLevel==='mid').length}</div></div>
    <div class="stat-card red"><div class="stat-label">高风险 🔴</div><div class="stat-value">${actives.filter(s=>s.riskLevel==='high').length}</div></div>
    <div class="stat-card blue"><div class="stat-label">平均评分</div><div class="stat-value">${actives.length ? Math.round(actives.reduce((a,s)=>a+s.riskScore,0)/actives.length) : 0}</div></div>
  `;

  // List
  const el = document.getElementById('risk-list');
  el.innerHTML = list.map(s=>{
    const rl = RISK_MAP[s.riskLevel];
    return `<div class="subj-card" onclick="showRisk('${s.id}')">
      <div class="subj-info">
        <div class="subj-name">${s.name}</div>
        <div class="subj-meta"><span>${s.product}</span><span>·</span><span>评分 ${s.riskScore}</span></div>
      </div>
      <div class="subj-right"><div class="tag ${rl.cls}">${rl.label}</div></div>
    </div>`;
  }).join('');
  if(!list.length) el.innerHTML='<div class="empty-state"><p>暂无匹配主体</p></div>';

  updateRiskCharts(actives);
}

function updateRiskCharts(actives){
  const low=actives.filter(s=>s.riskLevel==='low').length;
  const mid=actives.filter(s=>s.riskLevel==='mid').length;
  const high=actives.filter(s=>s.riskLevel==='high').length;

  if(chDist) chDist.destroy();
  chDist = new Chart(document.getElementById('chartDist'),{
    type:'doughnut',
    data:{ labels:['低风险 🟢','中风险 🟡','高风险 🔴'], datasets:[{data:[low,mid,high], backgroundColor:['#188038','#e37400','#d93025']}] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{padding:12,font:{size:12}} } } }
  });

  const prods=['蔬菜','荔枝','生猪','水产'];
  const avg = prods.map(p=>{const a=actives.filter(s=>s.product===p); return a.length?Math.round(a.reduce((x,s)=>x+s.riskScore,0)/a.length):0;});
  if(chProd) chProd.destroy();
  chProd = new Chart(document.getElementById('chartProd'),{
    type:'bar',
    data:{ labels:prods, datasets:[{ data:avg, backgroundColor:['#1a73e8','#e37400','#d93025','#188038'] }] },
    options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ min:0, max:100, ticks:{stepSize:20}} }, plugins:{ legend:{display:false} } }
  });
}

function showRisk(id){
  const s = SUBJECTS.find(x=>x.id===id);
  if(!s) return;
  const srCls = s.riskLevel==='low'?'green':s.riskLevel==='mid'?'orange':'red';
  const grade = s.riskLevel==='low'?'良好':s.riskLevel==='mid'?'关注':'危险';

  const bars = DIM_KEYS.map(k=>{
    const v=s.dims[k]; const c=v>=80?'var(--success)':v>=60?'var(--warning)':'var(--danger)';
    return `<div class="bar"><div class="bar-label"><span>${DIM_LABELS[k]}</span><span>${v}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${v}%;background:${c};"></div></div></div>`;
  }).join('');

  const advice = s.riskLevel==='high'
    ? '🔴 建议启动重点监控，每月检测1次+飞行抽检。加强生产管理培训，完善农事记录制度。'
    : s.riskLevel==='mid'
    ? '🟡 建议每季度检测1次，重点关注投入品使用规范。完善生产记录可追溯体系。'
    : '🟢 继续保持当前管理标准，每半年检测1次。建议探索品牌增值服务。';

  setModal('📊 ' + s.name, `
    <div style="text-align:center;">
      <div class="score-ring ${srCls}"><div class="num">${s.riskScore}</div><div class="lbl">${grade}</div></div>
      <div style="font-size:12px;color:var(--muted);">${s.product} · ${s.type}</div>
    </div>
    <div style="margin-top:10px;">${bars}</div>
    <div class="advice-box" style="margin-top:12px;"><strong>📋 风险控制建议</strong><br>${advice}</div>
  `, `<button class="btn btn-ghost btn-sm" onclick="closeModal()">关闭</button>`);
}

// ════════════════════════════════════════════
// TAB 3: 监测预警
// ════════════════════════════════════════════
function renderAlerts(){
  document.getElementById('m3-stats').innerHTML = `
    <div class="stat-card red"><div class="stat-label">一级 🔴</div><div class="stat-value">${alerts.filter(a=>a.level===1).length}</div></div>
    <div class="stat-card orange"><div class="stat-label">二级 🟠</div><div class="stat-value">${alerts.filter(a=>a.level===2).length}</div></div>
    <div class="stat-card" style="border-left:3px solid #ea8600;"><div class="stat-label">三级 🟡</div><div class="stat-value">${alerts.filter(a=>a.level===3).length}</div></div>
    <div class="stat-card blue"><div class="stat-label">今日检测</div><div class="stat-value">${testLogs.filter(t=>t.time.includes('今天')).length}</div></div>
  `;

  const el = document.getElementById('alert-list');
  if(!alerts.length){
    el.innerHTML='<div class="empty-state"><div class="icon">✅</div><p>暂无预警</p></div>';
    updateTrendChart(); renderTestFeed(); return;
  }
  const lvMap = {1:'🔴 一级预警',2:'🟠 二级预警',3:'🟡 三级预警'};
  const clsMap = {1:'alert-red',2:'alert-orange',3:'alert-yellow'};
  el.innerHTML = alerts.map((a,i)=>`
    <div class="alert-item ${clsMap[a.level]}">
      <div class="alert-top">
        <span class="alert-level">${lvMap[a.level]}</span>
        <span class="alert-time">${a.time}</span>
      </div>
      <div class="alert-detail">${a.subj} · ${a.prod} · ${a.item}: ${a.val}（≤${a.lim}）<br>${a.note}</div>
      <div class="alert-actions">
        <button class="btn btn-xs btn-primary" onclick="procAlert(${i})">处理</button>
        <button class="btn btn-xs btn-ghost" onclick="dismissAlert(${i})">忽略</button>
      </div>
    </div>
  `).join('');
  updateTrendChart();
  renderTestFeed();
}

function dismissAlert(i){ alerts.splice(i,1); renderAlerts(); }

function procAlert(i){
  const a = alerts[i];
  const measures = a.level===1
    ? '🔴 立即封存产品 → 通知农业农村部门 → 启动召回程序 → 无害化处理 → 预备理赔'
    : a.level===2
    ? '🟠 暂停出货建议 → 加强休药期管理 → 7日后复检 → 排查投入品记录'
    : '🟡 提醒主体加强管理 → 增加检测频率 → 关注趋势变化';

  setModal('🚨 处理预警', `
    <div class="dl">
      <div class="dl-item"><div class="dk">主体</div><div class="dv">${a.subj}</div></div>
      <div class="dl-item"><div class="dk">品种</div><div class="dv">${a.prod}</div></div>
      <div class="dl-item"><div class="dk">检测项目</div><div class="dv">${a.item}</div></div>
      <div class="dl-item"><div class="dk">检测值</div><div class="dv">${a.val}</div></div>
      <div class="dl-item"><div class="dk">标准限值</div><div class="dv">${a.lim}</div></div>
      <div class="dl-item"><div class="dk">风险说明</div><div class="dv">${a.note}</div></div>
    </div>
    <div style="margin-top:12px;font-size:14px;font-weight:500;">⚡ 建议处理措施</div>
    <div class="advice-box" style="margin-top:8px;">${measures}</div>
  `, `<button class="btn btn-success btn-sm" onclick="dismissAlert(${i});closeModal();toast('✅ 预警已处理，闭环完成')">✅ 标记已处理</button>
       <button class="btn btn-ghost btn-sm" onclick="closeModal()">返回</button>`);
}

function simAlert(){
  const actives = SUBJECTS.filter(s=>s.status==='active');
  if(!actives.length) return;
  const s = actives[Math.floor(Math.random()*actives.length)];
  const items = ['毒死蜱','甲胺磷','吡虫啉','磺胺类','孔雀石绿','克百威','氧乐果','瘦肉精'];
  const item = items[Math.floor(Math.random()*items.length)];
  const num = (Math.random()*2.5+0.5).toFixed(2);
  const lim = (Math.random()*2+1).toFixed(1);
  const over = parseFloat(num)/parseFloat(lim);
  const level = over>=1.5?1 : over>=1.0?2 : 3;
  const unit = item.includes('类')||item==='瘦肉精'?'μg/kg':'mg/kg';
  const notes = { 1:`超标 ${(over*100).toFixed(0)}%，需立即处置！`, 2:`超标 ${(over*100).toFixed(0)}%，需加强管理`, 3:`接近限值，呈上升趋势` };
  const now = new Date();
  const t = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');

  alerts.unshift({ level, subj:s.name, prod:s.product, item, val:num+' '+unit, lim:lim+' '+unit, note:notes[level], time:'今天 '+t });
  testLogs.unshift({ time:'今天 '+t, subj:s.name, prod:s.product, item, val:num+' '+unit, lim:lim+' '+unit, pass:level<2 });
  renderAlerts();

  if(level<=2) toast((level===1?'🔴 一级预警！':'🟠 二级预警！')+'\n'+s.name+' · '+s.product+' · '+item);
}

function renderTestFeed(){
  const el = document.getElementById('test-feed');
  el.innerHTML = testLogs.slice(0,10).map(t=>`
    <div class="test-item">
      <div class="test-main">
        <div class="test-subj">${t.subj} · ${t.prod}</div>
        <div class="test-detail">${t.item}: ${t.val} | ${t.time}</div>
      </div>
      <div><span class="tag ${t.pass?'tag-green':'tag-red'}">${t.pass?'✅ 合格':'❌ 不合格'}</span></div>
    </div>
  `).join('');
}

function updateTrendChart(){
  if(!document.getElementById('chartTrend')) return;
  const days=['7/1','7/2','7/3','7/4'];
  const data=[12,8,15,alerts.length];
  if(chTrend) chTrend.destroy();
  chTrend = new Chart(document.getElementById('chartTrend'),{
    type:'line',
    data:{ labels:days, datasets:[{ label:'预警数', data, borderColor:'#d93025', backgroundColor:'rgba(217,48,37,.1)', fill:true, tension:.3, pointRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, scales:{y:{beginAtZero:true,ticks:{stepSize:5}}}, plugins:{legend:{display:false}} }
  });
}

// ════════════════════════════════════════════
// MODAL UTILITY
// ════════════════════════════════════════════
function setModal(title, body, foot){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-foot').innerHTML = foot || '';
}

function showModal(){ document.getElementById('modal').classList.add('show'); }

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
renderSubjects();
renderRiskList();
renderAlerts();
</script>
</body>
</html>
